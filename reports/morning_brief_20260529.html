<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盘前纪要 - 2026-05-29 周五</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-btn {
            display: inline-block; padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3);
            color: #FFD700; text-decoration: none; border-radius: 4px;
            margin-bottom: 20px;
        }
        .header {
            text-align: center; margin-bottom: 20px; padding: 20px;
            background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 8px;
        }
        .header h1 { color: #FFD700; font-size: 24px; margin-bottom: 10px; }
        .header .date { color: #a0a0b0; font-size: 14px; }
        .tabs {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            color: #ccc; cursor: pointer; text-decoration: none;
        }
        .tab:hover { background: rgba(255, 215, 0, 0.1); color: #FFD700; }
        .tab.active { background: rgba(255, 215, 0, 0.15); color: #FFD700; border-color: #FFD700; }
        iframe {
            width: 100%; height: 80vh; border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; background: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← 返回首页</a>
        
        <div class="header">
            <h1>📊 盘前纪要</h1>
            <div class="date">2026-05-29 周五</div>
        </div>

        <div class="tabs">
            <a class="tab active" onclick="switchTab(0)">📰 盘前纪要</a>
            <a class="tab" onclick="switchTab(1)">📋 开盘必读</a>
        </div>

        <iframe id="contentFrame" src="https://www.jiuyangongshe.com/a/jrsst0j85y"></iframe>
    </div>
    
    <script>
        const urls = [
            'https://www.jiuyangongshe.com/a/jrsst0j85y',
            'https://www.jiuyangongshe.com/a/2z3nl4k8fgw'
        ];
        const tabs = document.querySelectorAll('.tab');
        
        function switchTab(idx) {
            document.getElementById('contentFrame').src = urls[idx];
            tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
        }
    </script>
</body>
</html>
