<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易报告列表 - A股超短线量化交易系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 32px;
        }
        .back-link {
            display: inline-block;
            color: #00d4ff;
            text-decoration: none;
            margin-bottom: 24px;
        }
        .back-link:hover { text-decoration: underline; }
        .section {
            margin-bottom: 40px;
        }
        .section h2 {
            color: #00d4ff;
            font-size: 1.3rem;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .report-list {
            display: grid;
            gap: 12px;
        }
        .report-item {
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .report-item:hover {
            background: rgba(22, 33, 62, 1);
            border-color: #00d4ff;
        }
        .report-name {
            font-weight: 500;
        }
        .report-date {
            color: #888;
            font-size: 0.9rem;
        }
        .report-link {
            color: #00d4ff;
            text-decoration: none;
            padding: 6px 16px;
            border: 1px solid #00d4ff;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .report-link:hover {
            background: #00d4ff;
            color: #0a0a1a;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <h1>📊 交易报告列表</h1>
        <p class="subtitle">A股超短线量化交易系统 · 实盘5万资金账户</p>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="analysisCount">-</div>
                <div class="stat-label">交易分析报告</div>
            </div>
        </div>

        <div class="section">
            <h2>📈 交易分析报告</h2>
            <div class="report-list" id="analysisReports">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 交易分析报告列表
        const analysisReports = [
            { name: '2026-05-27 交易分析', date: '2026-05-27', file: 'trade_analysis_20260527.html' },
            { name: '2026-05-26 交易分析', date: '2026-05-26', file: 'trade_analysis_20260526.html' },
            { name: '2026-05-25 交易分析', date: '2026-05-25', file: 'trade_analysis_20260525.html' },
            { name: '2026-05-22 交易分析', date: '2026-05-22', file: 'trade_analysis_20260522.html' },
            { name: '2026-05-21 交易分析', date: '2026-05-21', file: 'trade_analysis_20260521.html' },
            { name: '2026-05-20 交易分析', date: '2026-05-20', file: 'trade_analysis_20260520.html' },
            { name: '2026-05-19 交易分析', date: '2026-05-19', file: 'trade_analysis_20260519.html' },
            { name: '2026-05-18 交易分析', date: '2026-05-18', file: 'trade_analysis_20260518.html' },
            { name: '2026-05-15 交易分析', date: '2026-05-15', file: 'trade_analysis_20260515.html' },
        ];

        // 渲染报告列表
        function renderReports(containerId, reports) {
            const container = document.getElementById(containerId);
            container.innerHTML = reports.map(r => `
                <div class="report-item">
                    <div>
                        <div class="report-name">${r.name}</div>
                        <div class="report-date">${r.date}</div>
                    </div>
                    <a href="reports/${r.file}" class="report-link" target="_blank">查看报告</a>
                </div>
            `).join('');
        }

        // 更新统计
        document.getElementById('analysisCount').textContent = analysisReports.length;

        // 渲染列表
        renderReports('analysisReports', analysisReports);
    </script>
</body>
</html>
