<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易报告 - A股超短线量化交易系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 2rem; color: #00d4ff; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 32px; }
        .back-link {
            display: inline-block; color: #00d4ff; text-decoration: none;
            margin-bottom: 24px; font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
        .section { margin-bottom: 40px; }
        .section-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; padding-bottom: 12px;
            border-bottom: 2px solid #00d4ff;
        }
        .section-icon { font-size: 1.5rem; }
        .section-title { font-size: 1.4rem; color: #00d4ff; font-weight: 600; }
        .section-count {
            background: #00d4ff; color: #0a0a1a;
            padding: 2px 10px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 600;
        }
        .report-grid { display: grid; gap: 16px; }
        .report-card {
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid #333; border-radius: 12px;
            padding: 24px; transition: all 0.3s;
        }
        .report-card:hover {
            background: rgba(22, 33, 62, 1);
            border-color: #00d4ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.1);
        }
        .report-info { margin-bottom: 16px; }
        .report-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
        .report-meta { color: #888; font-size: 0.9rem; }
        .report-actions { display: flex; gap: 12px; }
        .btn {
            display: inline-block; padding: 10px 24px;
            border-radius: 8px; text-decoration: none;
            font-weight: 500; font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #00d4ff; color: #0a0a1a;
        }
        .btn-primary:hover { background: #00b8d9; }
        .btn-outline {
            background: transparent; color: #00d4ff;
            border: 1px solid #00d4ff;
        }
        .btn-outline:hover { background: rgba(0, 212, 255, 0.1); }
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: #888;
        }
        .empty-state-icon { font-size: 3rem; margin-bottom: 16px; }
        .update-note {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px; padding: 16px;
            margin-top: 32px; font-size: 0.9rem;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <h1>📊 交易报告</h1>
        <p class="subtitle">A股超短线量化交易系统 · 实盘5万资金账户 · 从2026-05-27开始</p>

        <!-- 交易分析报告 -->
        <div class="section">
            <div class="section-header">
                <span class="section-icon">📈</span>
                <span class="section-title">交易分析报告</span>
                <span class="section-count" id="analysisCount">0</span>
            </div>
            <div class="report-grid" id="analysisReports">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 核心指标报告 -->
        <div class="section">
            <div class="section-header">
                <span class="section-icon">🎯</span>
                <span class="section-title">核心指标报告</span>
                <span class="section-count" id="pnlCount">0</span>
            </div>
            <div class="report-grid" id="pnlReports">
                <!-- 动态生成 -->
            </div>
        </div>

        <div class="update-note">
            💡 报告每日自动更新，数据从2026-05-27开始展示
        </div>
    </div>

    <script>
        // 交易分析报告
        const analysisReports = [
            {
                name: '2026-05-27 交易分析报告',
                date: '2026-05-27',
                file: 'reports/trade_analysis_20260527.html',
                desc: '今日交易复盘、持仓分析、盈亏统计'
            }
        ];

        // 核心指标报告
        const pnlReports = [
            {
                name: '5万账户实时状态',
                date: '实时更新',
                file: 'pnl_report.html',
                desc: '总资产、盈亏、持仓、风险指标'
            }
        ];

        // 渲染报告卡片
        function renderReports(containerId, reports) {
            const container = document.getElementById(containerId);
            if (reports.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无报告</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = reports.map(r => `
                <div class="report-card">
                    <div class="report-info">
                        <div class="report-name">${r.name}</div>
                        <div class="report-meta">${r.date} · ${r.desc}</div>
                    </div>
                    <div class="report-actions">
                        <a href="${r.file}" class="btn btn-primary" target="_blank">查看报告</a>
                    </div>
                </div>
            `).join('');
        }

        // 更新统计
        document.getElementById('analysisCount').textContent = analysisReports.length;
        document.getElementById('pnlCount').textContent = pnlReports.length;

        // 渲染列表
        renderReports('analysisReports', analysisReports);
        renderReports('pnlReports', pnlReports);
    </script>
</body>
</html>
