name: Update AI Hot News

on:
  # 每天早上8点（北京时间16:00 UTC）自动运行
  schedule:
    - cron: '0 16 * * *'
  
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Update AI Hot
        run: python update_ai_hot.py
      
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ai-hot.html
          git diff --staged --quiet || git commit -m "Update AI hot news $(date +%Y-%m-%d)"
          git push
